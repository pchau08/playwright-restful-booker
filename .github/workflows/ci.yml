name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  API_BASE_URL: https://restful-booker.herokuapp.com
  UI_BASE_URL: https://automationintesting.online
  ADMIN_USERNAME: admin
  ADMIN_PASSWORD: password
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Smoke Tests ─────────────────────────────────────────────────────────────
  # Fast sanity check — API + UI smoke tests on chromium only.
  # Runs first. If this fails, regression jobs don't start.

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npx playwright test --grep @smoke --project=chromium --project=api
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          UI_BASE_URL: ${{ env.UI_BASE_URL }}

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7

  # ─── API Regression ───────────────────────────────────────────────────────────
  # Full API test suite — no browser needed, runs fast.

  api-regression:
    name: API Regression
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test tests/api/ --project=api
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 30

  # ─── UI + Unified Regression (Sharded) ───────────────────────────────────────
  # Full UI and unified tests across chromium/firefox/webkit.
  # Sharded across 4 runners to cut wall-clock time by ~75%.

  ui-regression:
    name: UI Regression (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }} — ${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shardIndex: [1, 2]
        shardTotal: [2]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Run UI + Unified tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: npx playwright test tests/ui/ tests/unified/ tests/accessibility/ --project=${{ matrix.browser }} --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          UI_BASE_URL: ${{ env.UI_BASE_URL }}
          CI: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui-${{ matrix.browser }}-shard${{ matrix.shardIndex }}
          path: allure-results/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}-shard${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 14

  # ─── Allure Report ────────────────────────────────────────────────────────────
  # Merges all per-shard and per-browser Allure results into one report.

  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [api-regression, ui-regression]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results/

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate combined Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload combined Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-combined
          path: allure-report/
          retention-days: 30
